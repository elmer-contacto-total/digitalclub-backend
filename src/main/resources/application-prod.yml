# Production Profile Configuration
server:
  port: ${SERVER_PORT:8443}

# CORS: comma-separated list of allowed frontend origins
cors:
  allowed-origins: ${ALLOWED_ORIGINS:https://infinance.innovag.com.pe,https://mws.digitalclub.com.pe}

spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

logging:
  level:
    root: WARN
    com.digitalgroup.holape: INFO
    org.hibernate.SQL: WARN

# Production JWT settings (24 hours / 7 days)
jwt:
  expiration: 86400000
  refresh-expiration: 604800000

# Swagger / OpenAPI deshabilitado en producción.
# Expone toda la superficie de la API (endpoints, parámetros, schemas) y facilita
# enumeración a atacantes. En dev queda habilitado para los devs.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Universal password/otp: bypass de soporte. Hereda de application.yml (defaults vacíos).
# Para activar en una VM específica, setear APP_UNIVERSAL_PASSWORD y APP_UNIVERSAL_OTP
# en /etc/holape/holape.env. Si no se setean, las guards de AuthController y OtpService
# desactivan la rama automáticamente.
