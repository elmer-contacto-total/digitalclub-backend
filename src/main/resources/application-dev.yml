# Development Profile Configuration
#
# IMPORTANTE: este archivo NO debe contener secretos literales.
# Los valores reales se inyectan vía variables de entorno al arrancar:
#   export DB_HOST=... DB_USERNAME=... DB_PASSWORD=... JWT_SECRET=...
# Si una env var falta, Spring Boot fallará al arrancar (fail-fast).
#
# Para desarrollo local apunta a tu Postgres en localhost.
# Genera un JWT_SECRET aleatorio con: openssl rand -base64 48
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Datasource hereda de application.yml (lee DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/DB_PASSWORD)

  # Flyway migrations enabled for development
  flyway:
    enabled: true

logging:
  level:
    com.digitalgroup.holape: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG

# JWT en dev hereda de application.yml (lee JWT_SECRET del env, sin default).
